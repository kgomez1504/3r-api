<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Iniciar Sesión</title>
  <style>
    body {
      font-family: Arial;
      background: #f2f2f2;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .login-box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: black;
      color: white;
      border: none;
      cursor: pointer;
      border-radius: 5px;
    }
    #msg {
      color: red;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="login-box">
  <h2>Acceso</h2>
  <input id="user" type="text" placeholder="Usuario">
  <input id="pass" type="password" placeholder="Contraseña">
  <button onclick="login()">Entrar</button>
  <p id="msg"></p>
</div>

<!-- Supabase versión específica -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.min.js"></script>
<script>
  const supabaseUrl = "https://pkkblvultuuzgnuxxajs.supabase.co";
  const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBra2JsdnVsdHV1emdudXh4YWpzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzcwNTMxOTYsImV4cCI6MjA5MjYyOTE5Nn0.WpWrcMfAOKmf_nRCgU3wjVxjseC7J4G1mbXJRNmjAWo";
  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  async function login() {
    const correo = document.getElementById("user").value.trim();
    const pass = document.getElementById("pass").value.trim();

    if (!correo || !pass) {
      document.getElementById("msg").innerText = "Completa todos los campos";
      return;
    }

    const { data, error } = await supabaseClient
      .from("Usuarios3R")
      .select("Nombre")
      .eq("Correo", correo)
      .eq("Contraseña", pass)
      .maybeSingle();

    if (error) {
      console.error("Supabase error:", error);
      document.getElementById("msg").innerText = "Error: " + error.message;
      return;
    }

    if (!data) {
      document.getElementById("msg").innerText = "Usuario o contraseña incorrectos";
      return;
    }

    alert("Bienvenido " + data.Nombre);
    window.location.href = "app.html";
  }
</script>
</body>
</html>
